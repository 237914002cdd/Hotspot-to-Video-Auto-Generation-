<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="50%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#0A84FF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0A84FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#glow)"/>

  <!-- Top badge -->
  <rect x="340" y="240" width="400" height="60" rx="30" fill="rgba(255,255,255,0.04)" stroke="rgba(10,132,255,0.2)" stroke-width="1"/>
  <circle cx="380" cy="270" r="8" fill="#007AFF"/>
  <text x="540" y="278" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="1">{{BADGE}}</text>

  <!-- Title -->
  <text x="540" y="520" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="130" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-3">{{TITLE_LINE_1}}</text>
  <text x="540" y="640" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="110" font-weight="700" fill="#0A84FF" text-anchor="middle" letter-spacing="-2">{{TITLE_LINE_2}}</text>

  <!-- Divider -->
  <rect x="390" y="720" width="300" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="540" y="820" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="34" font-weight="400" fill="rgba(255,255,255,0.35)" text-anchor="middle">{{SUBTITLE}}</text>

  <!-- Feature cards -->
  <rect x="140" y="940" width="800" height="80" rx="40" fill="rgba(255,255,255,0.03)" stroke="rgba(10,132,255,0.1)" stroke-width="1"/>
  <text x="540" y="990" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="32" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">{{FEATURE_1}}</text>

  <rect x="140" y="1040" width="800" height="80" rx="40" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="540" y="1090" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="32" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">{{FEATURE_2}}</text>

  <rect x="140" y="1140" width="800" height="80" rx="40" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="540" y="1190" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="32" font-weight="500" fill="rgba(255,255,255,0.5)" text-anchor="middle">{{FEATURE_3}}</text>

  <!-- Stats row -->
  <g transform="translate(540, 1340)">
    <rect x="-380" y="0" width="760" height="90" rx="24" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <text x="-240" y="34" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">{{TAG_1_LABEL}}</text>
    <text x="-240" y="66" font-size="30" font-weight="600" fill="#30D158" text-anchor="middle">{{TAG_1_VAL}}</text>
    <rect x="-70" y="20" width="1" height="50" fill="rgba(255,255,255,0.06)"/>
    <text x="0" y="34" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">{{TAG_2_LABEL}}</text>
    <text x="0" y="66" font-size="30" font-weight="600" fill="#0A84FF" text-anchor="middle">{{TAG_2_VAL}}</text>
    <rect x="70" y="20" width="1" height="50" fill="rgba(255,255,255,0.06)"/>
    <text x="240" y="34" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">{{TAG_3_LABEL}}</text>
    <text x="240" y="66" font-size="30" font-weight="600" fill="#FF9F0A" text-anchor="middle">{{TAG_3_VAL}}</text>
  </g>

  <!-- CTA -->
  <rect x="290" y="1520" width="500" height="64" rx="32" fill="#0A84FF"/>
  <text x="540" y="1560" font="-apple-system,'Helvetica Neue','SF Pro Display',sans-serif" font-size="26" font-weight="600" fill="#FFFFFF" text-anchor="middle">{{CTA}}</text>

  <!-- Footer -->
  <text x="540" y="1700" font="-apple-system,'SF Mono','JetBrains Mono',monospace" font-size="14" fill="rgba(255,255,255,0.08)" text-anchor="middle" letter-spacing="3">{{FOOTER}}</text>
</svg>
