<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF9F0A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Diagonal split -->
  <polygon points="0,0 960,0 960,1080 0,1080" fill="#0A0A0A"/>
  <polygon points="960,0 1920,0 1920,1080 960,1080" fill="#000000"/>

  <!-- Separator line -->
  <line x1="960" y1="0" x2="960" y2="1080" stroke="#1C1C1E" stroke-width="1"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1920" height="1" fill="#1C1C1E"/>

  <!-- Left side - large title -->
  <!-- Left side - large title -->
  <text x="480" y="420" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">hyperframes</text>
  <text x="480" y="500" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="#636366" text-anchor="middle" letter-spacing="0">零构建 · 纯 HTML · AI 原生</text>

  <!-- VS badge -->
  <rect x="885" y="350" width="150" height="40" rx="20" fill="#1C1C1E" stroke="#38383A" stroke-width="1"/>
  <text x="960" y="375" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="16" font-weight="700" fill="#AEAEB2" text-anchor="middle" letter-spacing="1">VS</text>

  <!-- Right side - large title -->
  <text x="1440" y="420" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">remotion</text>
  <text x="1440" y="500" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="22" font-weight="400" fill="#636366" text-anchor="middle" letter-spacing="0">React 驱动 · 帧级控制 · 生态成熟</text>

  <!-- Orange center line -->
  <rect x="660" y="560" width="600" height="2" rx="1" fill="url(#lineGrad)"/>

  <!-- Bottom tagline -->
  <text x="960" y="650" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="24" font-weight="600" fill="#FF9F0A" text-anchor="middle" letter-spacing="0">没有赢家，选适合你的</text>

  <!-- Bottom meta -->
  <rect x="800" y="800" width="320" height="36" rx="18" fill="#1C1C1E" stroke="#38383A" stroke-width="1"/>
  <text x="960" y="823" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="12" font-weight="500" fill="#636366" text-anchor="middle" letter-spacing="2">2 MIN COMPARISON · 2026</text>

  <!-- Footer line -->
  <rect x="0" y="1079" width="1920" height="1" fill="#1C1C1E"/>
</svg>
